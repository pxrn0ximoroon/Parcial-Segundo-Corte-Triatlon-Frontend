<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Atleta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <span class="material-icons">directions_run</span>
                Triatlón App
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">
                            <span class="material-icons">home</span> Inicio
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <span class="material-icons">manage_accounts</span> Atletas
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="crear.html"><span class="material-icons">person_add</span> Registrar</a></li>
                            <li><a class="dropdown-item" href="consultar.html"><span class="material-icons">search</span> Consultar</a></li>
                            <li><a class="dropdown-item" href="modificar.html"><span class="material-icons">edit</span> Modificar</a></li>
                            <li><a class="dropdown-item" href="eliminar.html"><span class="material-icons">delete</span> Eliminar</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container py-5">
        <h2 class="text-center mb-4">Registrar Atleta</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form id="formCrear">

                    <div class="mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" id="nombre" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Identificación</label>
                        <input type="text" class="form-control" id="identificacion" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Edad</label>
                        <input type="number" class="form-control" id="edad" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Género</label>
                        <select class="form-select" id="genero">
                            <option value="MASCULINO">Masculino</option>
                            <option value="FEMENINO">Femenino</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Especialidad</label>
                        <select class="form-select" id="especialidad">
                            <option value="SUPER_SPRINT">SuperSprint</option>
                            <option value="SPRINT">Sprint</option>
                            <option value="OLIMPICA">Olímpica</option>
                            <option value="MEDIA_DISTANCIA">Media Distancia</option>
                            <option value="LARGA_DISTANCIA">Larga Distancia</option>
                            <option value="ULTRAMAN">Ultraman</option>
                        </select>
                    </div>

                    <div class="mb-3 form-check">
                        <input type="checkbox" class="form-check-input" id="modalidadCross">
                        <label class="form-check-label">Modalidad Cross</label>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Foto</label>
                        <input type="file" class="form-control" id="foto" accept="image/*">
                    </div>

                    <div id="mensaje" class="mt-3"></div>

                    <button type="button" class="btn btn-primary w-100 mt-3" onclick="crearAtleta()">
                        <span class="material-icons">person_add</span> Registrar
                    </button>

                </form>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/atleta.js"></script>
</body>
</html>
