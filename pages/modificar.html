<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modificar Atleta</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg bg-dark navbar-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="../index.html">
                <span class="material-icons">directions_run</span>
                Triatlón App
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMenu">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMenu">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="../index.html">
                            <span class="material-icons">home</span> Inicio
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <span class="material-icons">manage_accounts</span> Atletas
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="crear.html"><span class="material-icons">person_add</span> Registrar</a></li>
                            <li><a class="dropdown-item" href="consultar.html"><span class="material-icons">search</span> Consultar</a></li>
                            <li><a class="dropdown-item" href="modificar.html"><span class="material-icons">edit</span> Modificar</a></li>
                            <li><a class="dropdown-item" href="eliminar.html"><span class="material-icons">delete</span> Eliminar</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <section class="container py-5">
        <h2 class="text-center mb-4">Modificar Atleta</h2>
        <div class="row justify-content-center">
            <div class="col-md-6">

                <div class="mb-3">
                    <label class="form-label">ID del Atleta</label>
                    <input type="number" class="form-control" id="idAtleta" placeholder="Ingrese el ID">
                </div>

                <div class="mb-4">
                    <label class="form-label">Modificar Nombre</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="nuevoNombre" placeholder="Nuevo nombre">
                        <button type="button" class="btn btn-primary" onclick="modificarNombre()">
                            <span class="material-icons">save</span>
                        </button>
                    </div>
                    <div id="mensajeNombre" class="mt-2"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Modificar Identificación</label>
                    <div class="input-group">
                        <input type="text" class="form-control" id="nuevaIdentificacion" placeholder="Nueva identificación">
                        <button type="button" class="btn btn-primary" onclick="modificarIdentificacion()">
                            <span class="material-icons">save</span>
                        </button>
                    </div>
                    <div id="mensajeIdentificacion" class="mt-2"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Modificar Categoría</label>
                    <div class="input-group">
                        <select class="form-select" id="nuevaCategoria">
                            <option value="PRE_BENJAMIN">Pre-Benjamín</option>
                            <option value="BENJAMIN">Benjamín</option>
                            <option value="ALEVIN">Alevín</option>
                            <option value="INFANTIL">Infantil</option>
                            <option value="CADETE">Cadete</option>
                            <option value="JUVENIL">Juvenil</option>
                            <option value="JUNIOR">Júnior</option>
                            <option value="SUB23">Sub-23</option>
                            <option value="ABSOLUTA">Absoluta</option>
                            <option value="VETERANO1">Veterano 1</option>
                            <option value="VETERANO2">Veterano 2</option>
                            <option value="VETERANO3">Veterano 3</option>
                        </select>
                        <button type="button" class="btn btn-primary" onclick="modificarCategoria()">
                            <span class="material-icons">save</span>
                        </button>
                    </div>
                    <div id="mensajeCategoria" class="mt-2"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Modificar Especialidad</label>
                    <div class="input-group">
                        <select class="form-select" id="nuevaEspecialidad">
                            <option value="SUPER_SPRINT">SuperSprint</option>
                            <option value="SPRINT">Sprint</option>
                            <option value="OLIMPICA">Olímpica</option>
                            <option value="MEDIA_DISTANCIA">Media Distancia</option>
                            <option value="LARGA_DISTANCIA">Larga Distancia</option>
                            <option value="ULTRAMAN">Ultraman</option>
                        </select>
                        <button type="button" class="btn btn-primary" onclick="modificarEspecialidad()">
                            <span class="material-icons">save</span>
                        </button>
                    </div>
                    <div id="mensajeEspecialidad" class="mt-2"></div>
                </div>

                <div class="mb-4">
                    <label class="form-label">Modificar Modalidad Cross</label>
                    <div class="d-flex align-items-center gap-3">
                        <div class="form-check">
                            <input type="checkbox" class="form-check-input" id="nuevoCross">
                            <label class="form-check-label">Modalidad Cross</label>
                        </div>
                        <button type="button" class="btn btn-primary" onclick="modificarCross()">
                            <span class="material-icons">save</span>
                        </button>
                    </div>
                    <div id="mensajeCross" class="mt-2"></div>
                </div>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="../js/atleta.js"></script>
</body>
</html>
